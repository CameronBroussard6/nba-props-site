<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CTB Analytics — NBA Props</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d0f12;
  --surface:  #161920;
  --surface2: #1e2229;
  --border:   #2a2f38;
  --text:     #e8eaf0;
  --muted:    #6b7280;
  --accent:   #22c55e;
  --accent-d: #166534;
  --blue:     #3b82f6;
  --blue-d:   #1e3a5f;
  --warn:     #f59e0b;
  --danger:   #ef4444;
  --mono:     'IBM Plex Mono', monospace;
  --sans:     'IBM Plex Sans', sans-serif;
  --r:        6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* HEADER */
header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.brand {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #ffffff;
  margin-bottom: 2px;
}
.site-title {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
  line-height: 1.1;
}
.site-date {
  font-size: 12px;
  font-style: italic;
  color: #ffffff;
  margin-top: 3px;
}
#updated {
  font-family: var(--mono);
  font-size: 10px;
  color: #ffffff;
  margin-top: 6px;
}

/* RECORDS */
.records {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.rec {
  padding: 12px 20px;
  border-right: 1px solid var(--border);
}
.rec:last-child { border-right: none; }
.rec-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 5px;
}
.rec-val {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}
.rec-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  margin-top: 3px;
}
.pos { color: var(--accent); }
.neg { color: var(--danger); }

/* TABS */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 12px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color 0.15s;
  user-select: none;
  flex-shrink: 0;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab-ct {
  display: inline-block;
  background: var(--border);
  border-radius: 8px;
  padding: 1px 6px;
  font-size: 10px;
  font-family: var(--mono);
  margin-left: 5px;
  color: var(--muted);
}
.tab.active .tab-ct { background: var(--accent); color: #000; }

/* PANEL */
main { padding: 16px; }
.panel { display: none; }
.panel.active { display: block; }

/* TABLE WRAPPER */
.tbl-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table { width: 100%; border-collapse: collapse; font-size: 13px; }

thead th {
  padding: 9px 12px;
  text-align: left;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  white-space: nowrap;
}

tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }
td { padding: 10px 12px; vertical-align: middle; white-space: nowrap; }

/* PICK BADGE */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  font-family: var(--mono);
}
.b-str-over  { background: #052e16; color: var(--accent); border: 1px solid var(--accent-d); }
.b-str-under { background: var(--blue-d); color: #93c5fd; border: 1px solid #1d4ed8; }
.b-over      { background: #14532d; color: #4ade80; }
.b-under     { background: #1e3a5f; color: #93c5fd; }
.b-pass      { background: var(--surface2); color: var(--muted); }

/* EDGE SCORE */
.es {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
}
.es-elite { color: #a78bfa; font-weight: 700; }
.es-high  { color: var(--accent); }
.es-mid   { color: var(--warn); }
.es-low   { color: var(--muted); }

/* ROLE FLAG */
.rflag {
  display: inline-block;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--mono);
}
.rf-up   { background: #451a03; color: #fb923c; }
.rf-down { background: #1e1b4b; color: #a5b4fc; }
.rf-norm { color: var(--muted); }

/* AGREEMENT DOT */
.adot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 5px;
}
.a-HIGH { background: var(--accent); }
.a-MED  { background: var(--warn); }
.a-LOW  { background: var(--muted); }

/* EDGE */
.ev { font-family: var(--mono); font-size: 12px; font-weight: 500; }
.ep { color: var(--accent); }
.en { color: #f87171; }

/* PLAYER CELL */
.pname { font-weight: 500; font-size: 13px; }
.pgame {
  font-size: 10px;
  color: var(--muted);
  font-family: var(--mono);
  margin-top: 1px;
}

/* MONO VALUE */
.mv { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.mv-bright { font-family: var(--mono); font-size: 13px; color: var(--text); }

/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 50px 20px;
  color: var(--muted);
}
.empty .icon { font-size: 28px; margin-bottom: 10px; }

/* SEASON LOG */
.result-win  { color: var(--accent); font-weight: 600; }
.result-loss { color: var(--danger); font-weight: 600; }
.result-push { color: var(--muted); font-weight: 600; }

/* MOBILE CARDS */
.mobile-cards { display: none; }
.mobile-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px;
  margin-bottom: 10px;
}
.mobile-card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.mobile-meta {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}
.mobile-stat {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 8px;
}
.mobile-stat-label {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.mobile-stat-value {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
}

/* MOBILE */
@media (max-width: 600px) {
  header { padding: 14px 14px 12px; }
  main { padding: 10px; }

  .site-title { font-size: 18px; }
  .site-date { font-size: 12px; }

  .records {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
  .rec {
    min-width: 0;
    padding: 10px 10px;
    border-right: 1px solid var(--border);
  }
  .rec:nth-child(3n) { border-right: none; }
  .rec-val { font-size: 15px; }
  .rec-sub { font-size: 9px; }

  .tabs { padding: 0 6px; }
  .tab { padding: 12px 10px; font-size: 12px; }

  .desktop-table { display: none; }
  .mobile-cards { display: block; }
  .mobile-meta { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .col-hide-mobile { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="brand">CTB Analytics</div>
  <div class="site-title">NBA Props Sheet</div>
  <div class="site-date" id="run-date">—</div>
  <div id="updated"></div>
</header>

<div class="records">
  <div class="rec">
    <div class="rec-label">Threes</div>
    <div class="rec-val" id="r-fg3m">—</div>
    <div class="rec-sub" id="r-fg3m-pct">—</div>
  </div>
  <div class="rec">
    <div class="rec-label">Rebounds</div>
    <div class="rec-val" id="r-reb">—</div>
    <div class="rec-sub" id="r-reb-pct">—</div>
  </div>
  <div class="rec">
    <div class="rec-label">Assists</div>
    <div class="rec-val" id="r-ast">—</div>
    <div class="rec-sub" id="r-ast-pct">—</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="fg3m">Threes <span class="tab-ct" id="ct-fg3m">0</span></div>
  <div class="tab" data-tab="reb">Rebounds <span class="tab-ct" id="ct-reb">0</span></div>
  <div class="tab" data-tab="ast">Assists <span class="tab-ct" id="ct-ast">0</span></div>
  <div class="tab" data-tab="log">Season Log</div>
</div>

<main>
  <div class="panel active" id="panel-fg3m"></div>
  <div class="panel" id="panel-reb"></div>
  <div class="panel" id="panel-ast"></div>
  <div class="panel" id="panel-log"></div>
</main>

<script>
const GITHUB_USER = 'CameronBroussard6';
const GITHUB_REPO = 'nba-props-site';
const BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main`;
const TARGETS = ['fg3m','reb','ast'];
const LABELS  = {fg3m:'Threes', reb:'Rebounds', ast:'Assists'};

function today() { return new Date().toISOString().slice(0,10); }

function ordinal(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function fmtDateOrdinal(str) {
  if (!str) return '—';
  const d = new Date(str + 'T12:00:00');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${ordinal(d.getDate())} ${d.getFullYear()}`;
}

async function fetchCSV(url) {
  try {
    const r = await fetch(url + '?t=' + Date.now());
    if (!r.ok) return null;
    return parseCSV(await r.text());
  } catch (e) {
    return null;
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; continue; }
      if (line[i] === ',' && !inQ) { vals.push(cur); cur = ''; continue; }
      cur += line[i];
    }
    vals.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
    return obj;
  });
}

function fmt(v, d = 1) {
  const n = parseFloat(v);
  return isNaN(n) ? '—' : n.toFixed(d);
}
function fmtRec(w, l) { return (w + l === 0) ? '—' : `${w}-${l}`; }
function pct(w, l) { return (w + l === 0) ? '—' : `${Math.round(w / (w + l) * 100)}%`; }

function computeRec(rows, opts = {}) {
  let w = 0, l = 0;
  rows.forEach(r => {
    if (opts.target && r.target !== opts.target) return;
    if (r.result === 'WIN') w++;
    if (r.result === 'LOSS') l++;
  });
  return { w, l };
}

function renderRecords(tracking) {
  if (!tracking || !tracking.length) return;
  TARGETS.forEach(t => {
    const r = computeRec(tracking, { target: t });
    document.getElementById(`r-${t}`).textContent = fmtRec(r.w, r.l);
    document.getElementById(`r-${t}-pct`).textContent = pct(r.w, r.l);
  });
}

function badgeClass(pick) {
  if (!pick || pick === 'PASS') return 'b-pass';
  if (pick.includes('STRONG') && pick.includes('OVER')) return 'b-str-over';
  if (pick.includes('STRONG') && pick.includes('UNDER')) return 'b-str-under';
  if (pick.includes('OVER')) return 'b-over';
  if (pick.includes('UNDER')) return 'b-under';
  return 'b-pass';
}

function arrow(dir) {
  if (dir === 'OVER') return '↑';
  if (dir === 'UNDER') return '↓';
  return '';
}

function esClass(score) {
  const n = parseFloat(score);
  if (isNaN(n)) return 'es-low';
  if (n >= 12) return 'es-elite';
  if (n >= 7) return 'es-high';
  if (n >= 4) return 'es-mid';
  return 'es-low';
}

function edgeScoreStyle(score) {
  const n = parseFloat(score);
  if (isNaN(n)) return '';
  const clamped = Math.max(0, Math.min(14, n));
  const hue = 220 + ((clamped / 14) * 60);
  const light = 72 - ((clamped / 14) * 10);
  const weight = clamped >= 10 ? 700 : clamped >= 6 ? 600 : 500;
  return `color:hsl(${hue}, 85%, ${light}%); font-weight:${weight};`;
}

function roleFlagHtml(flag) {
  if (!flag || flag === 'NORMAL') return '';
  const cls = flag === 'ROLE_UP' ? 'rf-up' : 'rf-down';
  const lbl = flag === 'ROLE_UP' ? '▲ ROLE UP' : '▼ ROLE DN';
  return ` <span class="rflag ${cls}">${lbl}</span>`;
}

function buildTable(rows, target) {
  const picks = rows
    .filter(r => r.pick && r.pick !== 'PASS')
    .sort((a, b) => parseFloat(b.edge_score || 0) - parseFloat(a.edge_score || 0));
  const passes = rows.filter(r => !r.pick || r.pick === 'PASS');

  if (rows.length === 0) {
    return `<div class="empty"><div class="icon">🏀</div><p>No ${LABELS[target]} data for today.</p></div>`;
  }

  const renderRow = (r) => {
    const edge = parseFloat(r.edge);
    const es = parseFloat(r.edge_score);
    return `<tr>
      <td>
        <div class="pname">${r.player_name || '—'}${roleFlagHtml(r.role_flag)}</div>
        <div class="pgame">${(r.game || '').replace(' @ ',' · ')}</div>
      </td>
      <td><span class="badge ${badgeClass(r.pick)}">${arrow(r.direction)} ${(r.direction || r.pick || 'PASS')}</span></td>
      <td><span class="es ${esClass(r.edge_score)}" style="${edgeScoreStyle(r.edge_score)}">${isNaN(es) ? '—' : es.toFixed(1)}</span></td>
      <td><span class="adot a-${r.agreement || 'LOW'}"></span><span class="mv">${r.agreement || '—'}</span></td>
      <td><span class="mv-bright">${fmt(r.line)}</span></td>
      <td><span class="mv-bright">${fmt(r.prediction)}</span></td>
      <td><span class="ev ${edge >= 0 ? 'ep' : 'en'}">${edge >= 0 ? '+' : ''}${fmt(edge, 2)}</span></td>
      <td class="col-hide-mobile"><span class="mv">${fmt(r.m8_last3)}</span></td>
      <td class="col-hide-mobile"><span class="mv">${fmt(r.m4_mean)}</span></td>
    </tr>`;
  };

  const renderCard = (r) => {
    const edge = parseFloat(r.edge);
    const es = parseFloat(r.edge_score);
    return `<div class="mobile-card">
      <div class="mobile-card-head">
        <div>
          <div class="pname">${r.player_name || '—'}${roleFlagHtml(r.role_flag)}</div>
          <div class="pgame">${(r.game || '').replace(' @ ',' · ')}</div>
        </div>
        <div><span class="badge ${badgeClass(r.pick)}">${arrow(r.direction)} ${(r.direction || r.pick || 'PASS')}</span></div>
      </div>
      <div class="mobile-meta">
        <div class="mobile-stat"><div class="mobile-stat-label">Edge Score</div><div class="mobile-stat-value ${esClass(r.edge_score)}" style="${edgeScoreStyle(r.edge_score)}">${isNaN(es) ? '—' : es.toFixed(1)}</div></div>
        <div class="mobile-stat"><div class="mobile-stat-label">Agreement</div><div class="mobile-stat-value">${r.agreement || '—'}</div></div>
        <div class="mobile-stat"><div class="mobile-stat-label">Line</div><div class="mobile-stat-value">${fmt(r.line)}</div></div>
        <div class="mobile-stat"><div class="mobile-stat-label">Model</div><div class="mobile-stat-value">${fmt(r.prediction)}</div></div>
        <div class="mobile-stat"><div class="mobile-stat-label">Edge</div><div class="mobile-stat-value ${edge >= 0 ? 'ep' : 'en'}">${edge >= 0 ? '+' : ''}${fmt(edge, 2)}</div></div>
        <div class="mobile-stat"><div class="mobile-stat-label">Last 3</div><div class="mobile-stat-value">${fmt(r.m8_last3)}</div></div>
      </div>
    </div>`;
  };

  const pickRows = picks.map(r => renderRow(r)).join('');
  const passRows = passes.map(r => renderRow(r)).join('');
  const pickCards = picks.map(r => renderCard(r)).join('');
  const passCards = passes.map(r => renderCard(r)).join('');

  return `
    <div class="tbl-wrap desktop-table"><table>
      <thead><tr>
        <th>Player</th>
        <th>Pick</th>
        <th>Edge Score</th>
        <th>Agreement</th>
        <th>Line</th>
        <th>Model</th>
        <th>Edge</th>
        <th class="col-hide-mobile">Last 3</th>
        <th class="col-hide-mobile">Season</th>
      </tr></thead>
      <tbody>${pickRows}${passRows}</tbody>
    </table></div>
    <div class="mobile-cards">${pickCards}${passCards}</div>`;
}

function renderLog(tracking) {
  const panel = document.getElementById('panel-log');
  if (!tracking || !tracking.length) {
    panel.innerHTML = `<div class="empty"><div class="icon">📋</div><p>No resolved picks yet — check back after games finish.</p></div>`;
    return;
  }

  const resolved = tracking
    .filter(r => r.result && r.result !== '' && r.result !== 'NA')
    .sort((a, b) => b.date.localeCompare(a.date));

  if (!resolved.length) {
    panel.innerHTML = `<div class="empty"><div class="icon">📋</div><p>Picks logged — results will populate after games resolve tonight.</p></div>`;
    return;
  }

  const rows = resolved.map(r => {
    const cls = r.result === 'WIN' ? 'result-win' : r.result === 'LOSS' ? 'result-loss' : 'result-push';
    const units = parseFloat(r.profit_units);
    const es = parseFloat(r.edge_score);
    return `<tr>
      <td><span class="mv">${r.date}</span></td>
      <td class="pname">${r.player_name}</td>
      <td><span class="mv">${LABELS[r.target] || r.target}</span></td>
      <td><span class="badge ${badgeClass(r.pick)}">${r.pick}</span></td>
      <td><span class="mv-bright">${fmt(r.line)}</span></td>
      <td><span class="mv-bright">${fmt(r.actual)}</span></td>
      <td><span class="${cls}">${r.result}</span></td>
      <td><span class="es ${esClass(r.edge_score)}" style="${edgeScoreStyle(r.edge_score)}">${isNaN(es) ? '—' : es.toFixed(1)}</span></td>
      <td><span class="ev ${!isNaN(units) && units >= 0 ? 'ep' : 'en'}">${!isNaN(units) ? (units >= 0 ? '+' : '') + units.toFixed(3) : '—'}</span></td>
    </tr>`;
  }).join('');

  panel.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr>
      <th>Date</th><th>Player</th><th>Stat</th><th>Pick</th>
      <th>Line</th><th>Actual</th><th>Result</th><th>Edge Score</th><th>Units</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

async function init() {
  const dateStr = today();
  document.getElementById('run-date').textContent = fmtDateOrdinal(dateStr);
  document.getElementById('updated').textContent = `Last run: ${dateStr}`;

  for (const tgt of TARGETS) {
    const panel = document.getElementById(`panel-${tgt}`);
    panel.innerHTML = `<div class="empty"><div class="icon">⟳</div></div>`;

    let rows = await fetchCSV(`${BASE}/data/edge_sheet_${tgt}_${dateStr}.csv`);
    let usedDate = dateStr;

    if (!rows || !rows.length) {
      const yd = new Date(Date.now() - 86400000).toISOString().slice(0,10);
      rows = await fetchCSV(`${BASE}/data/edge_sheet_${tgt}_${yd}.csv`);
      usedDate = yd;
    }

    if (rows && rows.length) {
      const pickCount = rows.filter(r => r.pick && r.pick !== 'PASS').length;
      document.getElementById(`ct-${tgt}`).textContent = pickCount;
      panel.innerHTML = buildTable(rows, tgt);
      if (usedDate !== dateStr) {
        document.getElementById('updated').textContent = `Last run: ${usedDate}`;
      }
    } else {
      panel.innerHTML = `<div class="empty"><div class="icon">📭</div><p>No data yet for ${LABELS[tgt]}.</p></div>`;
      document.getElementById(`ct-${tgt}`).textContent = '0';
    }
  }

  const tracking = await fetchCSV(`${BASE}/tracking/picks_log.csv`);
  renderRecords(tracking);
  renderLog(tracking);
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(`panel-${t.dataset.tab}`).classList.add('active');
  });
});

init();
</script>
</body>
</html>
